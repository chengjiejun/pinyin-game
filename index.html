<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>拼音小游戏</title>
    <style>
        /* ===== 全局样式（第一版：蓝白风格） ===== */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, "PingFang SC", "Microsoft YaHei", sans-serif;
            background: #e8f4f8;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 16px;
        }
        .container {
            max-width: 500px;
            width: 100%;
            background: #ffffff;
            border-radius: 24px;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.1);
            padding: 20px 16px 30px;
            position: relative;
            min-height: 80vh;
        }

        /* 开始界面 */
        #startPage {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px 0;
            position: relative;
        }
        #startPage h1 {
            font-size: 32px;
            color: #2c3e50;
            margin-bottom: 8px;
        }
        #startPage p {
            font-size: 16px;
            color: #7f8c8d;
            margin-bottom: 30px;
        }
        .start-btn {
            width: 80%;
            padding: 18px 0;
            margin: 10px 0;
            border: none;
            border-radius: 50px;
            font-size: 22px;
            font-weight: bold;
            color: white;
            background: #7fb3d5;
            box-shadow: 0 4px 8px rgba(0, 0, 0, 0.1);
            cursor: pointer;
            transition: transform 0.15s;
        }
        .start-btn:active { transform: scale(0.95); }
        .start-btn.words { background: #5bc0de; }
        .start-btn.sentences { background: #5cb85c; }
        .start-btn.articles { background: #f0ad4e; }

        /* 设置按钮（齿轮） - 通用样式 */
        .settings-btn {
            background: none;
            border: none;
            font-size: 28px;
            cursor: pointer;
            color: #7f8c8d;
            transition: transform 0.2s;
            padding: 4px 8px;
            line-height: 1;
        }
        .settings-btn:hover { transform: rotate(60deg); }
        .settings-btn:active { transform: scale(0.9); }

        /* 开始界面的设置按钮 */
        #startPage .settings-btn {
            position: absolute;
            top: 10px;
            right: 10px;
        }

        /* 游戏界面的设置按钮 */
        #gamePage .settings-btn {
            position: absolute;
            top: 10px;
            right: 10px;
            font-size: 24px;
            color: #4a90d9;
        }

        /* 游戏界面需要相对定位 */
        #gamePage {
            display: none;
            flex-direction: column;
            position: relative;
            padding-top: 8px;
        }

        /* 设置弹窗 */
        .settings-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.4);
            justify-content: center;
            align-items: center;
            z-index: 2000;
        }
        .settings-overlay.active { display: flex; }
        .settings-modal {
            background: white;
            border-radius: 28px;
            padding: 30px 24px 24px;
            max-width: 340px;
            width: 90%;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }
        .settings-modal h2 {
            font-size: 22px;
            color: #2c3e50;
            margin-bottom: 20px;
        }
        .settings-modal .btn-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin: 16px 0;
        }
        .settings-modal .btn-group .btn {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: bold;
            color: white;
            cursor: pointer;
            transition: transform 0.1s;
        }
        .settings-modal .btn-group .btn:active { transform: scale(0.96); }
        .settings-modal .btn-group .btn-on { background: #5cb85c; }
        .settings-modal .btn-group .btn-off { background: #d9534f; }
        .settings-modal .btn-close {
            background: #95a5a6;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-size: 14px;
            cursor: pointer;
            margin-top: 8px;
        }

        /* 游戏界面其他样式 */
        .mode-title {
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            color: #4a90d9;
            margin-bottom: 16px;
            margin-top: 4px;
        }

        .char-grid {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 6px 8px;
            background: #fafafa;
            padding: 16px 10px;
            border-radius: 16px;
            margin-bottom: 16px;
            min-height: 100px;
        }

        .char-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            width: 64px;
            min-height: 96px;
            padding: 4px 2px;
            border-radius: 8px;
            background: #ffffff;
            box-shadow: 0 1px 4px rgba(0, 0, 0, 0.06);
            transition: background 0.2s;
            flex-shrink: 0;
        }
        .char-item.punct {
            justify-content: center;
            background: transparent;
            box-shadow: none;
            min-height: 96px;
            width: 40px;
        }
        .char-item.punct .char-label {
            font-size: 28px;
            color: #999;
            font-weight: 400;
            margin-bottom: 0;
        }
        .char-item.space {
            background: transparent;
            box-shadow: none;
            width: 20px;
            min-height: 96px;
        }

        .char-label {
            font-size: 26px;
            font-weight: 600;
            color: #4a90d9;
            line-height: 1.3;
            margin-bottom: 2px;
            user-select: none;
        }
        .char-item.punct .char-label,
        .char-item.space .char-label {
            font-size: 26px;
            color: #999;
            font-weight: 400;
        }

        .char-input {
            width: 56px;
            height: 38px;
            font-size: 18px;
            text-align: center;
            border: 2px solid #ccc;
            border-radius: 8px;
            background: #fefefe;
            outline: none;
            transition: border-color 0.2s, background 0.2s;
            font-family: inherit;
            color: #2c3e50;
        }
        .char-input:focus {
            border-color: #4a90d9;
            background: #fff;
            box-shadow: 0 0 0 3px rgba(74, 144, 217, 0.15);
        }
        .char-input.correct {
            border-color: #5cb85c;
            background: #d4edda;
        }
        .char-input.wrong {
            border-color: #d9534f;
            background: #f8d7da;
        }

        .btn-group {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 8px;
            margin-top: 6px;
        }
        .btn {
            padding: 10px 18px;
            border: none;
            border-radius: 30px;
            font-size: 15px;
            font-weight: 600;
            color: white;
            background: #7fb3d5;
            cursor: pointer;
            flex: 1 0 auto;
            min-width: 70px;
            transition: background 0.2s, transform 0.1s;
            box-shadow: 0 2px 6px rgba(0, 0, 0, 0.08);
        }
        .btn:active { transform: scale(0.96); }
        .btn-primary { background: #5bc0de; }
        .btn-success { background: #5cb85c; }
        .btn-warning { background: #f0ad4e; }
        .btn-danger { background: #d9534f; }
        .btn-orange { background: #e67e22; }
        .btn-home { background: #95a5a6; }

        /* 弹窗（得分/错题） */
        .overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.4); justify-content: center; align-items: center; z-index:999; }
        .overlay.active { display: flex; }
        .modal {
            background: white;
            border-radius: 28px;
            padding: 32px 24px 24px;
            max-width: 380px;
            width: 90%;
            text-align: center;
            box-shadow: 0 12px 40px rgba(0,0,0,0.2);
        }
        .modal h2 { font-size: 28px; color: #2c3e50; margin-bottom: 8px; }
        .modal .score-number { font-size: 48px; font-weight: bold; color: #5cb85c; }
        .modal .score-number.low { color: #d9534f; }
        .modal .detail { font-size: 16px; color: #555; margin: 8px 0 16px; }
        .modal .wrong-btn {
            background: #f0ad4e;
            color: white;
            border: none;
            padding: 8px 18px;
            border-radius: 20px;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 12px;
        }
        .modal .btn-group-modal { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
        .modal .btn-group-modal .btn { flex:1; min-width:80px; }

        .wrong-overlay { display: none; position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(0,0,0,0.5); justify-content: center; align-items: center; z-index:1000; }
        .wrong-overlay.active { display: flex; }
        .wrong-modal {
            background: white;
            border-radius: 28px;
            padding: 24px 20px;
            max-width: 400px;
            width: 90%;
            max-height: 70vh;
            overflow-y: auto;
        }
        .wrong-modal h3 { color: #c0392b; margin-bottom: 12px; }
        .wrong-item {
            display: flex;
            justify-content: space-between;
            padding: 6px 0;
            border-bottom: 1px solid #eee;
            font-size: 16px;
        }
        .wrong-item .ch { font-weight: bold; font-size: 20px; color: #2c3e50; }
        .wrong-item .correct { color: #5cb85c; }
        .wrong-item .user { color: #d9534f; }
        #perfectMsg { color: #5cb85c !important; }

        /* 响应式 */
        @media (max-width: 480px) {
            .char-item { width: 52px; min-height: 84px; padding: 2px 1px; }
            .char-item.punct { width: 32px; min-height: 84px; }
            .char-item.space { width: 14px; min-height: 84px; }
            .char-label { font-size: 22px; }
            .char-item.punct .char-label, .char-item.space .char-label { font-size: 22px; }
            .char-input { width: 46px; height: 34px; font-size: 16px; }
            .btn { font-size: 13px; padding: 8px 12px; min-width: 60px; }
            .start-btn { font-size: 18px; padding: 14px 0; }
            .modal .score-number { font-size: 38px; }
            #gamePage .settings-btn { font-size: 20px; top: 6px; right: 6px; }
        }
        @media (max-width: 380px) {
            .char-item { width: 44px; min-height: 74px; }
            .char-item.punct { width: 28px; min-height: 74px; }
            .char-item.space { width: 12px; min-height: 74px; }
            .char-label { font-size: 18px; }
            .char-item.punct .char-label, .char-item.space .char-label { font-size: 18px; }
            .char-input { width: 40px; height: 30px; font-size: 14px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ===== 开始界面 ===== -->
        <div id="startPage">
            <button class="settings-btn" id="settingsToggleBtn" title="设置">⚙️</button>
            <h1>📚 拼音小游戏</h1>
            <p>选择一种模式，开始挑战吧！</p>
            <button class="start-btn words" data-mode="words">📝 词语练习</button>
            <button class="start-btn sentences" data-mode="sentences">📖 句子练习</button>
            <button class="start-btn articles" data-mode="articles">📄 文章练习</button>
        </div>

        <!-- ===== 游戏界面 ===== -->
        <div id="gamePage">
            <!-- 游戏界面的设置按钮 -->
            <button class="settings-btn" id="settingsToggleBtnGame" title="设置">⚙️</button>
            <div class="mode-title" id="modeTitle">词语练习 (5个一组)</div>
            <div id="charGrid" class="char-grid"></div>
            <div class="btn-group" id="btnGroup"></div>
        </div>
    </div>

    <!-- ===== 设置弹窗 ===== -->
    <div class="settings-overlay" id="settingsOverlay">
        <div class="settings-modal">
            <h2>⚙️ 键盘设置</h2>
            <p style="color:#555; font-size:14px; margin-bottom:16px;">切换是否允许手机弹出虚拟键盘</p>
            <div class="btn-group">
                <button class="btn btn-on" id="enableKeyboardBtn">📱 开启手机键盘</button>
                <button class="btn btn-off" id="disableKeyboardBtn">⌨️ 关闭手机键盘</button>
            </div>
            <button class="btn-close" id="closeSettingsBtn">关闭</button>
        </div>
    </div>

    <!-- 得分弹窗 -->
    <div class="overlay" id="scoreOverlay">
        <div class="modal">
            <h2>🏆 得分</h2>
            <div class="score-number" id="scoreNum">0</div>
            <div class="detail" id="scoreDetail">正确 0 / 0 字</div>
            <button class="wrong-btn" id="viewWrongBtn" style="display:none;">📖 查看错题</button>
            <div id="perfectMsg" style="display:none; font-size:20px; margin:8px 0;">🎉 全部正确！太棒了！</div>
            <div class="btn-group-modal">
                <button class="btn btn-primary" id="nextRoundBtn">➡️ 下一题</button>
                <button class="btn btn-home" id="closeScoreBtn">关闭</button>
            </div>
        </div>
    </div>

    <!-- 错题本 -->
    <div class="wrong-overlay" id="wrongOverlay">
        <div class="wrong-modal">
            <h3>📕 错题本</h3>
            <div id="wrongList"></div>
            <button class="btn btn-home" style="width:100%; margin-top:16px;" id="closeWrongBtn">关闭</button>
        </div>
    </div>

        const ARTICLES_POOL = [

        // ============================================================
        //  全局设置状态
        // ============================================================
        let keyboardEnabled = true;

        // ============================================================
        //  工具函数
        // ============================================================
        function isPunct(ch) {
            return /[，。！？、；：……—·《》‘’“”（）\.,;:!?'"()\s]/.test(ch);
        }
        function getValidChars(text) {
            return [...text].filter(ch => PINYIN_DICT[ch] !== undefined && !isPunct(ch));
        }
        function splitPinyinInput(str) {
            return str.trim().split(/\s+/).filter(s => s !== '');
        }

        // ============================================================
        //  游戏状态
        // ============================================================
        let currentMode = 'words';
        let batchItems = [];
        let batchIndex = 0;
        let batchAnswers = [];
        const BATCH_SIZE = { words: 5, sentences: 3 };

        // ============================================================
        //  DOM 引用
        // ============================================================
        const startPage = document.getElementById('startPage');
        const gamePage = document.getElementById('gamePage');
        const modeTitle = document.getElementById('modeTitle');

        const nextRoundBtn = document.getElementById('nextRoundBtn');
        const closeScoreBtn = document.getElementById('closeScoreBtn');

        // 设置相关 DOM
        const settingsToggleBtn = document.getElementById('settingsToggleBtn');
        const settingsToggleBtnGame = document.getElementById('settingsToggleBtnGame');
        const settingsOverlay = document.getElementById('settingsOverlay');

        const disableKeyboardBtn = document.getElementById('disableKeyboardBtn');
        const closeSettingsBtn = document.getElementById('closeSettingsBtn');

        // ============================================================
        //  设置面板事件（两个按钮共用同一个弹窗）
        // ============================================================
        function openSettings(e) {
            if (e) e.stopPropagation();
            settingsOverlay.classList.add('active');
        }

        settingsToggleBtn.addEventListener('click', openSettings);
        settingsToggleBtnGame.addEventListener('click', openSettings);

        function closeSettings() {
            settingsOverlay.classList.remove('active');
        }

        closeSettingsBtn.addEventListener('click', closeSettings);
        settingsOverlay.addEventListener('click', function(e) {
            if (e.target === this) closeSettings();
        });

            keyboardEnabled = true;
            alert('✅ 已开启手机键盘（虚拟键盘将正常弹出）');

            if (gamePage.style.display !== 'none') {
                render();
            }

        disableKeyboardBtn.addEventListener('click', function() {
            keyboardEnabled = false;
            alert('✅ 已关闭手机键盘（虚拟键盘将不再弹出，请使用外接键盘）');

                render();

        // ============================================================
        //  游戏核心函数
        // ============================================================
        function getPool() {
            if (currentMode === 'words') return WORDS_POOL;
            if (currentMode === 'sentences') return SENTENCES_POOL;
            return ARTICLES_POOL;
        }

        function generateBatch() {
            const pool = getPool().filter(item => item.trim() !== '');
            if (pool.length === 0) { batchItems = []; batchIndex = 0; batchAnswers = []; return; }
            const size = BATCH_SIZE[currentMode] || 3;
            const shuffled = pool.slice().sort(() => Math.random() - 0.5);
            batchItems = shuffled.slice(0, Math.min(size, shuffled.length));
            batchIndex = 0;
            batchAnswers = new Array(batchItems.length).fill('');
        }

        function getCurrentItem() { return batchItems[batchIndex] || ''; }
        function getCurrentChars() { return getValidChars(getCurrentItem()); }

        function saveCurrentAnswer(str) {
            if (batchIndex < batchAnswers.length) batchAnswers[batchIndex] = str;
        }
        function nextItem() {
            if (batchIndex < batchItems.length - 1) { batchIndex++; return true; }
            return false;
        }
        function prevItem() {
            if (batchIndex > 0) { batchIndex--; return true; }
            return false;
        }

        // ============================================================
        //  计分
        // ============================================================
        function calculateScore(items, answers) {
            let correct = 0, errors = [], total = 0;
            for (let i = 0; i < items.length; i++) {
                const chars = getValidChars(items[i]);
                if (chars.length === 0) continue;
                total += chars.length;
                const parts = splitPinyinInput(answers[i] || '');
                for (let j = 0; j < chars.length; j++) {
                    const ch = chars[j];
                    const correctPinyin = PINYIN_DICT[ch] || '';
                    const userPinyin = (j < parts.length) ? parts[j].toLowerCase() : '';
                    if (userPinyin === correctPinyin) correct++;
                    else errors.push({ char: ch, correct: correctPinyin, user: userPinyin });
                }
            }
            return { correct, errors, total };
        }

        // ============================================================
        //  渲染
        // ============================================================
        function render() {
            const fullText = getCurrentItem();
            const chars = getCurrentChars();
            const modeNames = { words: '词语练习 (5个一组)', sentences: '句子练习 (3句一组)', articles: '文章练习' };
            modeTitle.textContent = modeNames[currentMode] || '练习';

            gridEl.innerHTML = '';

            for (let i = 0; i < fullText.length; i++) {
                const ch = fullText[i];
                const div = document.createElement('div');
                div.className = 'char-item';

                if (isPunct(ch)) {
                    div.classList.add('punct');
                    const label = document.createElement('div');
                    label.className = 'char-label';
                    label.textContent = ch;
                    div.appendChild(label);
                    gridEl.appendChild(div);
                    continue;
                }

                if (ch === ' ') {
                    div.classList.add('space');
                    gridEl.appendChild(div);
                    continue;
                }

                if (!PINYIN_DICT[ch]) {
                    const label = document.createElement('div');
                    label.className = 'char-label';
                    label.textContent = ch;
                    div.appendChild(label);
                    gridEl.appendChild(div);
                    continue;
                }

                // 正常汉字
                const label = document.createElement('div');
                label.className = 'char-label';
                label.textContent = ch;

                const input = document.createElement('input');
                input.className = 'char-input';
                input.type = 'text';
                input.maxLength = 10;
                // ★★★ 根据设置决定是否禁用虚拟键盘 ★★★
                input.inputMode = keyboardEnabled ? 'text' : 'none';
                input.dataset.char = ch;
                input.dataset.idx = i;

                const charIndex = chars.indexOf(ch);
                if (charIndex !== -1) {
                    const saved = batchAnswers[batchIndex] || '';
                    const parts = splitPinyinInput(saved);
                    if (charIndex < parts.length) input.value = parts[charIndex];
                }

                input.addEventListener('input', function() {
                    const ch = this.dataset.char;
                    const correct = PINYIN_DICT[ch] || '';
                    const user = this.value.trim().toLowerCase();
                    this.classList.remove('correct', 'wrong');
                    if (user === correct && user !== '') {
                        this.classList.add('correct');
                    } else if (user !== '' && user !== correct) {
                        this.classList.add('wrong');
                    }
                });

                input.addEventListener('keydown', function(e) {
                    const inputs = gridEl.querySelectorAll('.char-input');
                    const idx = parseInt(this.dataset.idx);
                    if (e.key === ' ' || e.key === 'Space' || e.key === 'ArrowDown') {
                        e.preventDefault();
                        for (let el of inputs) {
                            if (parseInt(el.dataset.idx) > idx) { el.focus(); return; }
                        }
                    } else if (e.key === 'ArrowUp') {
                        e.preventDefault();
                        for (let el of inputs) {
                            if (parseInt(el.dataset.idx) < idx) { el.focus(); return; }
                        }
                    } else if (e.key === 'Enter') {
                        e.preventDefault();
                        saveCurrentInputs();
                        handleNextOrSubmit();
                    }
                });

                div.appendChild(label);
                div.appendChild(input);
                gridEl.appendChild(div);
            }

            const firstInput = gridEl.querySelector('.char-input');
            if (firstInput) setTimeout(() => firstInput.focus(), 100);

            renderButtons();
        }

        // ============================================================
        //  保存、按钮、提交
        // ============================================================
        function saveCurrentInputs() {
            const inputs = gridEl.querySelectorAll('.char-input');
            const parts = [];
            inputs.forEach(inp => parts.push(inp.value.trim().toLowerCase()));
            saveCurrentAnswer(parts.join(' '));
        }

        function renderButtons() {
            btnGroup.innerHTML = '';
            const homeBtn = document.createElement('button');
            homeBtn.className = 'btn btn-home';
            homeBtn.textContent = '🏠 返回主页';
            homeBtn.addEventListener('click', goHome);
            btnGroup.appendChild(homeBtn);

            if (currentMode === 'articles') {
                const submitBtn = document.createElement('button');
                submitBtn.className = 'btn btn-success';
                submitBtn.textContent = '✅ 提交答案';
                submitBtn.addEventListener('click', handleSubmit);
                btnGroup.appendChild(submitBtn);
                return;
            }

            const isLast = (batchIndex === batchItems.length - 1);
            const isFirst = (batchIndex === 0);

            if (!isFirst) {
                const prevBtn = document.createElement('button');
                prevBtn.className = 'btn btn-primary';
                prevBtn.textContent = '⬅️ 上一个';
                prevBtn.addEventListener('click', () => {
                    saveCurrentInputs();
                    if (prevItem()) render();
                });
                btnGroup.appendChild(prevBtn);
            } else {
                const placeholder = document.createElement('span');
                placeholder.style.width = '80px';
                btnGroup.appendChild(placeholder);
            }

            if (isLast) {
                const submitBtn = document.createElement('button');
                submitBtn.className = 'btn btn-success';
                submitBtn.textContent = '✅ 提交答案';
                submitBtn.addEventListener('click', handleSubmit);
                btnGroup.appendChild(submitBtn);
            } else {
                const nextBtn = document.createElement('button');
                nextBtn.className = 'btn btn-warning';
                nextBtn.textContent = '➡️ 下一个';
                nextBtn.addEventListener('click', () => {
                    saveCurrentInputs();
                    if (nextItem()) render();
                });
                btnGroup.appendChild(nextBtn);
            }
        }

        function handleNextOrSubmit() {
            const isLast = (batchIndex === batchItems.length - 1);
            if (isLast) handleSubmit();
            else {
                saveCurrentInputs();
                if (nextItem()) render();
            }
        }

        function handleSubmit() {
            saveCurrentInputs();
            const result = calculateScore(batchItems, batchAnswers);
            currentWrongList = result.errors;
            showScore(result.correct, result.total, result.errors);
        }

        function showScore(correct, total, errors) {
            const percent = total > 0 ? Math.round((correct / total) * 100) : 0;
            scoreNum.textContent = percent + ' 分';
            scoreNum.className = 'score-number' + (percent < 100 ? ' low' : '');
            scoreDetail.textContent = `正确 ${correct} 字 / 共 ${total} 字`;

            if (errors.length > 0) {
                viewWrongBtn.style.display = 'inline-block';
                viewWrongBtn.textContent = `📖 查看错题（${errors.length} 个）`;
                perfectMsg.style.display = 'none';
            } else {
                viewWrongBtn.style.display = 'none';
                perfectMsg.style.display = 'block';
            }
            scoreOverlay.classList.add('active');
        }

        function closeScore() { scoreOverlay.classList.remove('active'); }
        function nextRound() { closeScore(); generateBatch(); render(); }
        function showWrongList() {
            if (currentWrongList.length === 0) return;
            wrongList.innerHTML = '';
            currentWrongList.forEach(item => {
                const div = document.createElement('div');
                div.className = 'wrong-item';
                div.innerHTML = `
                    <span class="ch">${item.char}</span>
                    <span class="correct">正确：${item.correct}</span>
                    <span class="user">你的输入：${item.user}</span>
                `;
                wrongList.appendChild(div);
            });
            wrongOverlay.classList.add('active');
        }
        function closeWrong() { wrongOverlay.classList.remove('active'); }

        function goHome() {
            gamePage.style.display = 'none';
            startPage.style.display = 'flex';
            batchItems = [];
            batchIndex = 0;
            batchAnswers = [];
        }

        function startGame(mode) {
            currentMode = mode;
            startPage.style.display = 'none';
            gamePage.style.display = 'flex';
            generateBatch();
            render();
        }

        // ============================================================
        //  事件绑定
        // ============================================================
        document.querySelectorAll('.start-btn').forEach(btn => {
            btn.addEventListener('click', function() {
                startGame(this.dataset.mode);
            });
        });

        viewWrongBtn.addEventListener('click', showWrongList);
        closeWrongBtn.addEventListener('click', closeWrong);
        closeScoreBtn.addEventListener('click', closeScore);
        nextRoundBtn.addEventListener('click', nextRound);
        scoreOverlay.addEventListener('click', function(e) { if (e.target === this) closeScore(); });
        wrongOverlay.addEventListener('click', function(e) { if (e.target === this) closeWrong(); });

        // 初始显示主页
        startPage.style.display = 'flex';
        gamePage.style.display = 'none';
    </script>
</body>
</html>
